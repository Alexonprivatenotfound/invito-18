<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>One Final Move</title>

<style>

body{
    margin:0;
    background:#0d0d0d;
    color:#fff;
    font-family:Georgia,serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

h1{
    font-weight:300;
    letter-spacing:3px;
    margin-bottom:10px;
}

p{
    color:#b9b9b9;
    text-align:center;
    margin:4px;
}

#board{
    display:grid;
    grid-template-columns:repeat(8,70px);
    grid-template-rows:repeat(8,70px);
    border:6px solid #d4af37;
    margin-top:30px;
    box-shadow:0 0 35px rgba(212,175,55,.3);
}

.square{
    width:70px;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:46px;
    user-select:none;
}

.light{
    background:#efe6d0;
}

.dark{
    background:#6a4c2d;
}

.selected{
    outline:5px solid gold;
}

.correct{
    background:#3a7d44 !important;
}

#message{
    margin-top:25px;
    font-size:22px;
    color:#d4af37;
    height:30px;
}

@media(max-width:650px){

#board{
grid-template-columns:repeat(8,42px);
grid-template-rows:repeat(8,42px);
}

.square{
width:42px;
height:42px;
font-size:28px;
}

}

</style>
</head>

<body>

<h1>ONE FINAL MOVE</h1>

<p>White to move.</p>
<p>Deliver checkmate in one to reveal your invitation.</p>

<div id="board"></div>

<div id="message"></div>

<script>

const board=document.getElementById("board");

const pieces={
"e7":"♕",
"e1":"♔",
"g8":"♚"
};

let selected=null;

const files="abcdefgh";

function createBoard(){

board.innerHTML="";

for(let r=8;r>=1;r--){

for(let f=0;f<8;f++){

const sq=document.createElement("div");

const coord=files[f]+r;

sq.dataset.square=coord;

sq.className="square "+(((r+f)%2==0)?"light":"dark");

sq.textContent=pieces[coord]||"";

sq.onclick=()=>clickSquare(coord);

board.appendChild(sq);

}

}

}

function clearSelection(){

document.querySelectorAll(".square").forEach(s=>s.classList.remove("selected"));

}

function clickSquare(square){

if(selected==null){

if(square==="e7"){

selected=square;

document.querySelector(`[data-square="${square}"]`).classList.add("selected");

}

return;

}

if(square==="e8"){

delete pieces.e7;

pieces.e8="♕";

createBoard();

document.querySelector(`[data-square="e8"]`).classList.add("correct");

document.getElementById("message").textContent="Checkmate.";

setTimeout(()=>{

window.location="invite.html";

},1500);

return;

}

selected=null;

clearSelection();

createBoard();

document.getElementById("message").textContent="Not quite. Try again.";

setTimeout(()=>{

document.getElementById("message").textContent="";

},1200);

}

createBoard();

</script>

</body>
</html>
